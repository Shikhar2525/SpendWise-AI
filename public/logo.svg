<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Rounded Background -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#logo-gradient)" filter="url(#shadow)"/>
  
  <!-- Wallet Icon -->
  <g transform="translate(26, 26) scale(2)">
    <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" stroke="#E0E7FF" stroke-opacity="0.85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 5v14a2 2 0 0 0 2 2h16v-5" stroke="#E0E7FF" stroke-opacity="0.85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18 12a2 2 0 0 0 0 4h4v-4Z" stroke="#E0E7FF" stroke-opacity="0.85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Top Right Sparkle Badge -->
  <rect x="68" y="2" width="30" height="30" rx="8" fill="white" filter="url(#shadow)"/>
  
  <!-- Sparkles Icon -->
  <g transform="translate(71, 5) scale(1)">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
